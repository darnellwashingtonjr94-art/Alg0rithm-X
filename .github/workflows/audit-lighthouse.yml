name: Scheduled Web Matrix Audit

on:
  schedule:
    # Runs at 00:00 every Sunday (UTC)
    - cron: '0 0 * * 0'
  workflow_dispatch: 
    # Allows you to trigger this workflow manually from the Actions tab

jobs:
  lighthouse-audit:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Lighthouse CLI
      run: npm install -g lighthouse

    - name: Execute Headless Audit
      env:
        # Replace this with the live endpoint or container you want to audit
        TARGET_URL: "https://example.com"
      run: |
        echo "Initiating audit for $TARGET_URL"
        mkdir -p ./reports
        
        # Runs lighthouse headlessly and outputs the raw JSON data
        lighthouse $TARGET_URL \
          --output=json \
          --output-path=./reports/audit_report.json \
          --quiet \
          --chrome-flags="--headless --no-sandbox --disable-gpu"

    - name: Upload Audit Artifact
      uses: actions/upload-artifact@v4
      with:
        name: lighthouse-audit-report
        path: ./reports/audit_report.json
        retention-days: 14 # Automatically deletes the report after two weeks
